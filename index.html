<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>アスキー枠の光るテキストボックスデモ</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Oswald:700|Bebas+Neue&display=swap">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <section class="ascii-message-area">
    <form>
      <div class="ascii-box">
        <pre class="ascii-border ascii-border-top"> ___________________________________________ </pre>
        <div class="ascii-border ascii-border-middle">
          <span class="ascii-border-side">|</span>
          <input type="text" class="ascii-input" placeholder="text" />
          <span class="ascii-border-side">|</span>
        </div>
        <pre class="ascii-border ascii-border-bottom">|___________________________________________|</pre>
      </div>
    </form>
  </section>
</body>
</html>
